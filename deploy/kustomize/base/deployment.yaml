apiVersion: v1
kind: ServiceAccount
metadata:
  name: crossplane-validate-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crossplane-validate-operator
  labels:
    app.kubernetes.io/name: crossplane-validate-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crossplane-validate-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crossplane-validate-operator
    spec:
      serviceAccountName: crossplane-validate-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: operator
          image: ghcr.io/tesserix/crossplane-validate-operator:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - --grpc-port=9443
            - --health-port=8081
          ports:
            - name: grpc
              containerPort: 9443
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
