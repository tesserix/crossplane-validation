apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crossplane-system

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: crossplane-validate-operator
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
