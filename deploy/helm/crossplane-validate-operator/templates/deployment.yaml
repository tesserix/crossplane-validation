apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: operator
          image: {{ include "operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - --grpc-port={{ .Values.service.httpPort }}
            - --health-port={{ .Values.service.healthPort }}
            - --log-level={{ .Values.operator.logLevel }}
            {{- if .Values.operator.leaderElect }}
            - --leader-elect=true
            {{- end }}
            {{- if .Values.operator.watchGroups }}
            - --watch-groups={{ .Values.operator.watchGroups }}
            {{- end }}
            {{- if and .Values.notifications.slack.enabled .Values.notifications.slack.webhookUrl }}
            - --slack-webhook={{ .Values.notifications.slack.webhookUrl }}
            {{- end }}
            {{- if and .Values.notifications.teams.enabled .Values.notifications.teams.webhookUrl }}
            - --teams-webhook={{ .Values.notifications.teams.webhookUrl }}
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if and .Values.cloudCredentials.reuseProviderSecret (eq .Values.cloudCredentials.provider "aws") }}
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /var/run/secrets/provider/{{ .Values.cloudCredentials.reuseProviderSecretKey }}
            {{- end }}
            {{- if and .Values.cloudCredentials.reuseProviderSecret (eq .Values.cloudCredentials.provider "gcp") }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/provider/{{ .Values.cloudCredentials.reuseProviderSecretKey }}
            {{- end }}
            {{- if .Values.cloudCredentials.envFromSecret }}
            {{- range $envVar, $secretKey := .Values.cloudCredentials.envFromSecret }}
            - name: {{ $envVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.cloudCredentials.existingSecret }}
                  key: {{ $secretKey }}
            {{- end }}
            {{- end }}
            {{- if .Values.cloudCredentials.gcpKeySecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/gcp/{{ .Values.cloudCredentials.gcpKeySecretKey }}
            {{- end }}
            {{- with .Values.cloudCredentials.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.cloudCredentials.reuseProviderSecret .Values.cloudCredentials.gcpKeySecret }}
          volumeMounts:
            {{- if .Values.cloudCredentials.reuseProviderSecret }}
            - name: provider-creds
              mountPath: /var/run/secrets/provider
              readOnly: true
            {{- end }}
            {{- if .Values.cloudCredentials.gcpKeySecret }}
            - name: gcp-key
              mountPath: /var/run/secrets/gcp
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.cloudCredentials.reuseProviderSecret .Values.cloudCredentials.gcpKeySecret }}
      volumes:
        {{- if .Values.cloudCredentials.reuseProviderSecret }}
        - name: provider-creds
          secret:
            secretName: {{ .Values.cloudCredentials.reuseProviderSecret }}
        {{- end }}
        {{- if .Values.cloudCredentials.gcpKeySecret }}
        - name: gcp-key
          secret:
            secretName: {{ .Values.cloudCredentials.gcpKeySecret }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
