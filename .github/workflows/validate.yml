name: Crossplane Validate

on:
  workflow_call:
    inputs:
      manifests:
        description: "Path to Crossplane manifests directory"
        required: false
        type: string
        default: "."
      base-branch:
        description: "Base branch to compare against"
        required: false
        type: string
        default: "main"
      cloud-mode:
        description: "Enable cloud-aware plan (requires credentials)"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      GOOGLE_CREDENTIALS:
        required: false
      AZURE_CREDENTIALS:
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build crossplane-validate
        run: |
          go build -o crossplane-validate ./cmd/crossplane-validate

      - name: Run validation
        id: validate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          args="plan --base=${{ inputs.base-branch }} --target=HEAD"
          args="$args --manifests=${{ inputs.manifests }}"
          args="$args --output=markdown"

          if [ "${{ inputs.cloud-mode }}" = "true" ]; then
            args="$args --cloud"
          fi

          ./crossplane-validate $args > plan-output.md 2>&1 || true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('plan-output.md', 'utf8');

            const body = output || '### Crossplane Validation\n\nNo changes detected.';

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '### Crossplane Validation';
            const existing = comments.data.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
