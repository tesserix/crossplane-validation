name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Vet
        run: go vet ./...
      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Test
        run: go test ./... -v -race -count=1
      - name: Build CLI
        run: go build -o /dev/null ./cmd/crossplane-validate
      - name: Build Operator
        run: go build -o /dev/null ./cmd/crossplane-validate-operator

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Check for secrets
        run: |
          if grep -rE "(AKIA[0-9A-Z]{16}|password\s*=\s*['\"][^'\"]+['\"]|sk-[a-zA-Z0-9]{48})" --include="*.go" --include="*.yaml" --include="*.yml" .; then
            echo "Potential secrets found!"
            exit 1
          fi
      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
