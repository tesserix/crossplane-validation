name: PR Validation Plan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build -o crossplane-validate ./cmd/crossplane-validate

      - name: Run validation plan
        id: plan
        run: |
          # Run plan against test manifests included in the repo
          ./crossplane-validate plan \
            --manifests=testdata/ \
            --base=origin/main \
            --target=HEAD \
            --output=markdown > plan-output.md 2>/dev/null || true

          # Also run scan to show resource inventory
          echo "" >> plan-output.md
          echo "<details>" >> plan-output.md
          echo "<summary>Resource Inventory</summary>" >> plan-output.md
          echo "" >> plan-output.md
          echo '```' >> plan-output.md
          ./crossplane-validate scan testdata/ 2>/dev/null >> plan-output.md || true
          echo '```' >> plan-output.md
          echo "</details>" >> plan-output.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('plan-output.md', 'utf8');
            const body = output || '### Crossplane Validation\n\nNo changes detected.';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '### Crossplane Validation';
            const existing = comments.data.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
