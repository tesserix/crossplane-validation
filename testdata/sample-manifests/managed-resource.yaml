apiVersion: iam.aws.upbound.io/v1beta1
kind: Role
metadata:
  name: app-role
spec:
  forProvider:
    assumeRolePolicy: |
      {
        "Version": "2012-10-17",
        "Statement": [{
          "Effect": "Allow",
          "Principal": {"Service": "eks.amazonaws.com"},
          "Action": "sts:AssumeRole"
        }]
      }
    tags:
      Environment: production
      Team: platform
  providerConfigRef:
    name: default
